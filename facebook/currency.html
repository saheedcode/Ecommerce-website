<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    

    <style>
*{
    margin:0;
    padding: 0;
    box-sizing: border-box;
    font-family:'popping', sans-serif;
}



body{
    display:flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 0 10px;
    background-image: linear-gradient(to right, #00b4db, #0083b0);
}

::selection{
    color:#fff;
    background:#675AFE;
}

.wrapper{
    width:500px;
    padding:30px;
    border-radius: 7px;
    box-shadow: 7px 7px 7px rgba(0, 0, 0, 0.05);
    background: #fff;
}

.wrapper header{
    font-size:28px;
    font-weight:500;
    text-align: center;


}
.wrapper form{
    margin:40px 0 20px 0;
    
}

form :where(input, select, button){
    width:100%;
    outline: none;
    border-radius: 5px;
    border:none;
}

form p{
    font-size: 18px;
    margin-bottom: 5px;
}
form input{
    height:50px;
    font-size: 17px;
    padding:0 15px;
    border: 1px solid #999;
}
form input:focus{
    padding: 0 14px;
    border: 2px solid #0083b0;
}

form input:focus{
    padding: 0 14px;
    border: 2px solid #0083b0;
}

form .drop-list{
    display: flex;
    margin-top: 20px;
    align-items: center;
    justify-content: space-between;
}
.drop-list .select-box{
    display:flex;
    width: 175px;
    height:45;
}
.select-box img{
    max-width:21px;

}

.select-box select{
    width:auto;
    font-size:20px;
    background: none;
    margin: 0 5px 0 5px;
}

.select-box select::-webkit-scrollbar{
width: 8px;
}

.select-box select::-webkit-scrollbar-thumb{
    background: #888;
    border-radius: 8px;
    border-right: 2px soldi #ffffff;
}
form .exchange-rate{
    border:1px dotted gray;
    border-radius: 5px;
    padding:7px;
    display:flex;
    justify-content: center;
    font-size: 19px;
    margin:20px 0 30px;

}

form button{
    height: 52px;
    color:#fff;
    font-size: 17px;
    cursor:pointer;
    background:#00b4db;
    transition: all 0.5s;
}

form button:hover{
    background: #049bce;
}
.footer .footer-text:hover{
   color:#035c7a; 
}

    </style>
</head>
<body>
   <div class="wrapper">
<header>Currency Exchange</header>
<form action="#">
    <div class="amount">
        <p>Enter Amount</p>
        <input type="text" value="1">
    </div>
    <div class="drow-list">
        <div class="from">
            <p>From</p>
            <div class="select-box">

    </div>
</form>
<select><!-- from javascript--></select>
</div>
</div>
<div class="icon"><i class="fas fa-exchange-alt"></i></div>
<div class="to">
    <p>To</p>
    <div class="select-box">

 <!--  <img src="#" alt="flag">-->
 <select><!-- from javascript--></select>
 </div>
</div>
</div>

<div class="exchange-rate">
    Getting Exchange rate..........
</div>
<button>Get Exchange Rate</button>

</form>

<div class="footer"><a class="footer-text" target="blank"> By My sky power</a> </div>
</div>
